name: release

# Build and publish the sdist + wheel to PyPI on a version tag (vX.Y.Z), or
# build-only on manual dispatch. Publishes with the PYPI_API_TOKEN repo secret
# (the name `clayseal-identity` is already registered). Preferred upgrade: add a
# Trusted Publisher (OIDC) for this repo/workflow/environment in the PyPI UI,
# then drop the password line below and delete the secret.
# Every dependency resolves from public PyPI.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write # PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
