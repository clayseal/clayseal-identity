name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: pberlizov/clay-seal-core
          token: ${{ secrets.CLAY_SEAL_CI_TOKEN || github.token }}
          path: deps/agentauth-core
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (core contract layer first)
        run: |
          pip install "./deps/agentauth-core[dev]"
          pip install -e ".[dev]"
      - name: Layering contract (identity never imports upward)
        run: |
          python -m agentauth.core.layering agentauth \
            --forbid agentauth.capabilities --forbid agentauth.receipts
      - name: Run tests
        run: pytest backend/tests sdk/python/tests -q
