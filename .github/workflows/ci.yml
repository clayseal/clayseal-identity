name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - name: Ruff lint
        run: ruff check .
      - name: Layering contract (identity never imports upper layers)
        run: |
          if grep -rnE "(import|from)[[:space:]]+agentauth\.(capabilities|receipts)" clayseal; then
            echo "::error::clayseal must not import upper layers (agentauth.capabilities / agentauth.receipts)"
            exit 1
          fi

  typecheck:
    runs-on: ubuntu-latest
    # Advisory while the codebase adopts type annotations incrementally. mypy
    # analyses source without importing, so no dependencies are required here.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install mypy
      - name: Mypy (advisory)
        run: mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      # agentauth-core is not yet on PyPI; build it from the sibling repo. Once it
      # is published, replace this checkout with `pip install agentauth-core`.
      - uses: actions/checkout@v4
        with:
          repository: pberlizov/clay-seal-core
          token: ${{ secrets.CLAY_SEAL_CI_TOKEN || github.token }}
          path: deps/agentauth-core
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (core contracts first, then this package)
        run: |
          python -m pip install --upgrade pip
          pip install "./deps/agentauth-core[dev]"
          pip install -e ".[dev]"
      - name: Tests with coverage
        run: >
          pytest backend/tests sdk/python/tests -q
          --cov=clayseal --cov-report=term-missing --cov-report=xml
