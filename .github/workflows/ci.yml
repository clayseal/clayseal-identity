name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - name: Ruff lint
        run: ruff check .
      - name: Standalone contract (no private package imports; shared helpers are vendored)
        run: |
          if grep -rnE "(import|from)[[:space:]]+(clay_seal_core|clayseal_core)" clayseal; then
            echo "::error::clayseal must not import private sibling packages — shared helpers are vendored in clayseal/_core.py"
            exit 1
          fi

  typecheck:
    runs-on: ubuntu-latest
    # Advisory while the codebase adopts type annotations incrementally. mypy
    # analyses source without importing, so no dependencies are required here.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install mypy
      - name: Mypy (advisory)
        run: mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Tests with coverage
        run: >
          pytest backend/tests sdk/python/tests -q
          --cov=clayseal --cov-report=term-missing --cov-report=xml
