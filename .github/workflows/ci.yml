name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - name: Ruff lint
        run: ruff check .
      - name: Standalone contract (no agentauth imports; shared helpers are vendored)
        run: |
          if grep -rnE "(import|from)[[:space:]]+agentauth" clayseal; then
            echo "::error::clayseal must not import any agentauth package — shared helpers are vendored in clayseal/_core.py"
            exit 1
          fi

  typecheck:
    runs-on: ubuntu-latest
    # Advisory while the codebase adopts type annotations incrementally. mypy
    # analyses source without importing, so no dependencies are required here.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install mypy
      - name: Mypy (advisory)
        run: mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Tests with coverage
        run: >
          pytest backend/tests sdk/python/tests -q
          --cov=clayseal --cov-report=term-missing --cov-report=xml

  # Internal-only: prove the vendored helpers in clayseal/_core.py have not
  # drifted from their agentauth-core originals. Skipped on fork PRs (no token);
  # the parity tests themselves skip when agentauth.core is not importable.
  core-parity:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: pberlizov/clay-seal-core
          token: ${{ secrets.CLAY_SEAL_CI_TOKEN || github.token }}
          path: deps/agentauth-core
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install (this package + core for comparison)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" "./deps/agentauth-core"
      - name: Vendored-core parity tests
        run: pytest sdk/python/tests/test_vendored_core.py -q
