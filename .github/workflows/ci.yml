name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
      - run: pip install ruff
      - name: Ruff lint
        run: ruff check .
      - name: Standalone contract (no private package imports; shared helpers are vendored)
        run: |
          if grep -rnE "(import|from)[[:space:]]+(clay_seal_core|clayseal_core)" clayseal; then
            echo "::error::clayseal must not import private sibling packages — shared helpers are vendored in clayseal/_core.py"
            exit 1
          fi

  typecheck:
    runs-on: ubuntu-latest
    # Advisory while the codebase adopts type annotations incrementally. mypy
    # analyses source without importing, so no dependencies are required here.
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
      - run: pip install mypy
      - name: Mypy (advisory)
        run: |
          mypy || {
            echo "::warning::mypy advisory failed; type coverage is not yet release-gating"
            exit 0
          }

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Tests with coverage
        run: >
          pytest backend/tests sdk/python/tests -q
          --cov=clayseal --cov-report=term-missing --cov-report=xml

  # Cross-language parity: prove @clayseal/verify (js/) accepts and rejects
  # exactly what the Python SDK produces. The fixture is minted by the Python
  # backend and its proof-of-possession is time-bound, so generate it and run
  # the Node tests in the same job, back to back.
  js-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install (Python service + JS deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[server]"
          cd js/clayseal-verify && npm install
      - name: Generate parity fixture from the Python backend
        run: python js/clayseal-verify/test/gen_fixture.py js/clayseal-verify/test/fixture.json
      - name: Run @clayseal/verify parity tests
        # --experimental-wasm-modules: biscuit-wasm imports a .wasm module, which
        # Node enables by default only on newer releases.
        run: cd js/clayseal-verify && node --experimental-wasm-modules --no-warnings --test test/*.test.mjs
