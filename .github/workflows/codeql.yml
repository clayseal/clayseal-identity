name: codeql

# Static analysis for the network-facing identity service. Python needs no
# build, so build-mode is "none".
on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "0 5 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    # Private repositories need GitHub Advanced Security/code scanning enabled
    # before CodeQL can upload results. Run automatically once public; for a
    # private GHAS repo, set CLAYSEAL_ENABLE_CODEQL=true as a repo/org variable.
    if: ${{ github.event.repository.private == false || vars.CLAYSEAL_ENABLE_CODEQL == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          build-mode: none
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
