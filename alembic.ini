# Alembic configuration for clayseal-identity.
#
# The database URL is NOT set here; migrations/env.py reads it from
# CLAYSEAL_DATABASE_URL (the same setting the app uses) so `alembic upgrade head`
# targets whatever the deployment is configured for. Run as a pre-deploy step:
#
#     CLAYSEAL_DATABASE_URL=postgresql://user:pass@host/db alembic upgrade head
#
[alembic]
script_location = migrations
prepend_sys_path = .
# Timezone-naive UTC timestamps in revision files (matches the models' convention).
timezone = UTC
version_path_separator = os

# sqlalchemy.url is intentionally left blank; env.py supplies it from the
# environment. A value here would just be a misleading default.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
